# 服务器配置
server.port=8080

# Spring应用配置
spring.application.name=user-auth-system

# MySQL数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/user_auth_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# 数据库连接池配置
spring.datasource.connection-properties=useUnicode=true;characterEncoding=UTF-8;characterSetResults=UTF-8

# JPA/Hibernate配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
# 时区配置
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai

# SQL初始化配置
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# SpringMVC配置
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
server.servlet.context-path=/api

# Swagger配置
spring.mvc.static-path-pattern=/**

# 文件上传配置
file.upload-dir=D:\\DOME\\backend\\uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 日志配置
logging.level.root=INFO
logging.level.com.example.userauth=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.jdbc=DEBUG